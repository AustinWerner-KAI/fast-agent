# fast-agent strategy configuration
# This is the only file the pipeline reads strategy parameters from.
# Do not store secrets here — use .env for API keys.

# Universe of symbols scanned by Scout on every cycle.
# All symbols must be listed on Hyperliquid perps.
symbols:
  - BTC
  - ETH
  - SOL
  - ARB
  - ADA
  - DOGE
  - TRX
  - HYPE
  - ZEC

# Decision memory cache TTL. A cached Arbiter verdict is only reused when
# evaluated_at is within this many hours of now. After expiry the bar is
# re-evaluated with fresh CoinGlass data (funding, OI, L/S ratio).
decision_memory:
  cache_ttl_hours: 24

# Funding rate thresholds for FUNDING_CROWDED severity (% per 8h).
# Applies to LONG proposals only. Negative funding always favours longs and
# never triggers FUNDING_CROWDED regardless of magnitude.
#   rate > funding_extreme_pct  → HIGH  (pre-filter veto via _apply_rules)
#   rate > funding_moderate_pct → MEDIUM (non-blocking caution flag)
#   rate ≤ funding_moderate_pct → no objection raised
funding_extreme_pct: 0.10
funding_moderate_pct: 0.05

# Stop correction when a market fill lands below the proposal's stop level.
# This occurs when OHLCV-derived entry price is stale vs live market price.
# Corrected stop = fill_price * (1 - tier_trail_pct). Does not reject the fill.
tier_trail_pct: 0.07

# Conviction-based position sizing.
# Tiers are evaluated in ascending max_conf order; the first tier whose
# max_conf strictly exceeds the proposal's confidence score is used.
# notional_usd is the target notional (not margin); leverage is applied by executor.
# free_margin_cap_pct caps margin per trade as a fraction of available margin.
conviction_sizing:
  tiers:
    - max_conf: 0.60   # conviction < 0.60
      notional_usd: 150
    - max_conf: 0.70   # 0.60 <= conviction < 0.70
      notional_usd: 300
    - max_conf: 0.80   # 0.70 <= conviction < 0.80
      notional_usd: 500
    - max_conf: 1.00   # conviction >= 0.80
      notional_usd: 1000
  free_margin_cap_pct: 0.33

# H4 ATR Chandelier + 15m micro-structure trailing stop.
# Applied by position_manager after TP1 / TP2 is hit.
position_management:
  # Max loss as a fraction of margin_used when geometry correction fires
  # (fill_price < proposal stop due to stale OHLCV entry).
  # Formula: effective_stop = fill_price - (margin_used * risk_pct_per_trade / fill_units)
  risk_pct_per_trade: 0.10
  take_profit:
    enable_resting_tp_orders: true
    tp1_rr: 2.0          # R-multiple for TP1 trigger price
    tp2_rr: 3.0          # R-multiple for TP2 trigger price
    tp1_fraction: 0.50   # fraction of original_size closed at TP1
    tp2_fraction: 0.30   # fraction of original_size closed at TP2
  trailing_stop:
    atr_period_h4: 14                       # Wilder ATR period on H4 candles
    atr_multiplier_chandelier: 2.0          # stop = running_high - 2.0 × ATR_H4
    stop_improvement_threshold_pct: 0.1     # ignore chandelier updates < 0.1% better
    micro_break_buffer_pct: 0.15            # 15m close must be ≥ 15% below EMA-20 to confirm
    enable_soft_trail_after_tp1: false      # raise stop to chandelier between TP1 and TP2
    enable_h4_atr_15m_combo_for_final_20: true  # gate final 20% exit on 15m confirmation
